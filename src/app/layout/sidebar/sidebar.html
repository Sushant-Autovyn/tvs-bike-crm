<aside class="sidebar">
  <div class="logo">
    <div class="logo-icon">V</div>
    <div>
      <h2>TVS</h2>
      <span class="service-text">BIKE CRM</span>
    </div>
  </div>

  <nav class="menu">
    <div class="menu-section">
      <h3 class="section-title">MAIN</h3>
      @for (item of mainMenuItems; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="active"
          class="menu-item"
        >
          <span class="icon">{{ item.icon }}</span>
          <span>{{ item.label }}</span>
        </a>
      }
    </div>

    <div class="menu-section">
      <h3 class="section-title">MANAGE</h3>
      @for (item of manageMenuItems; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="active"
          class="menu-item"
        >
          <span class="icon">{{ item.icon }}</span>
          <span>{{ item.label }}</span>
        </a>
      }
    </div>

    <div class="menu-section">
      <h3 class="section-title">SYSTEM</h3>
      @for (item of systemMenuItems; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="active"
          class="menu-item"
        >
          <span class="icon">{{ item.icon }}</span>
          <span>{{ item.label }}</span>
        </a>
      }
    </div>
  </nav>
</aside>
